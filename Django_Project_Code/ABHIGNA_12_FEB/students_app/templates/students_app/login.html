{% extends 'students_app/base.html' %}
{% block content %}

<style>
body {
    overflow: hidden;
    background: #f3f4f6;
    font-family: 'Poppins', sans-serif;
}

/* autofill fix */
input:-webkit-autofill {
    -webkit-box-shadow: 0 0 0 1000px white inset !important;
    -webkit-text-fill-color: #111 !important;
}

/* smoother inputs */
.form-control:focus{
    border-color:#2563eb !important;
    box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

/* button hover */
.login-btn{
    background:#1f3b73;
    border:none;
    color:white;
    padding:11px;
    border-radius:10px;
    font-weight:600;
    transition:0.25s ease;
}

.login-btn:hover{
    background:#16325c;
    transform: translateY(-2px);
    box-shadow:0 10px 20px rgba(31,59,115,0.25);
}
</style>

<div class="login-container d-flex justify-content-center align-items-start"
     style="height:100vh; padding-top:35px;">

    <!-- 🔻 HEIGHT REDUCED CARD -->
    <div class="card shadow-lg p-3"
         style="
            width:100%;
            max-width:420px;
            border:none;
            border-radius:18px;
            background:#ffffff;
            box-shadow:0 20px 50px rgba(0,0,0,0.12);
         ">

        <!-- ICON (reduced spacing) -->
        <div class="text-center mb-3">

            <i class="bi bi-person-circle"
               style="font-size:78px; color:#2563eb;
                      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));">
            </i>

            <h2 class="mt-1 fw-bold"
                style="color:#2563eb; font-size:27px;">
                Login
            </h2>

            <p style="color:#6b7280; font-size:13px; margin-bottom:0;">
                Student Management System
            </p>

        </div>

        <!-- MESSAGES -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger text-center py-2 mb-2"
                     style="border-radius:10px;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- FORM -->
        <form method="POST" autocomplete="off">

            {% csrf_token %}

            <input type="text" name="fake_user" style="display:none" autocomplete="off">
            <input type="password" name="fake_pass" style="display:none" autocomplete="off">

            <!-- USERNAME -->
            <div class="mb-2">
                <label class="fw-bold" style="color:#111827;">
                    Username
                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter username"
                       autocomplete="off"
                       required
                       style="
                            background:white;
                            border:1px solid #e5e7eb;
                            border-radius:10px;
                            padding:10px;
                            font-size:14px;
                       ">
            </div>

            <!-- PASSWORD -->
            <div class="mb-2">
                <label class="fw-bold" style="color:#111827;">
                    Password
                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter password"
                       autocomplete="new-password"
                       required
                       style="
                            background:white;
                            border:1px solid #e5e7eb;
                            border-radius:10px;
                            padding:10px;
                            font-size:14px;
                       ">
            </div>

            <!-- BUTTON -->
            <div class="d-grid mt-2">
                <button type="submit" class="login-btn">
                    <i class="bi bi-box-arrow-in-right me-2"></i>
                    Login
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}

{% extends 'students_app/base.html' %}
{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh;">

    <div class="card shadow-lg p-4" style="width: 100%; max-width: 450px; border-radius: 14px;">

        <div class="text-center mb-4">
            <i class="bi bi-person-circle" style="font-size: 50px; color: #0d6efd;"></i>
            <h4 class="mt-2 fw-bold text-primary">Login</h4>
            <p class="text-muted mb-0">Student Management System</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control"
                       placeholder="Enter username" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Enter password" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}
